# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
# =======================
# CI JOB: BUILD & PUSH
# =======================
  build:
    runs-on: ubuntu-latest

    env:
      SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      FRONTEND_ALLOWED_ORIGIN: ${{ secrets.FRONTEND_ALLOWED_ORIGIN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean install -Dmaven.test.skip=true

      - name: Login to Docker Hub
        run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Build Docker image
        run: docker build -t sunilya96/java-backend:latest .

      - name: Push Docker image
        run: docker push sunilya96/java-backend:latest


# =======================
# CD JOB: DEPLOY ON EC2
# =======================
  deploy:
    needs: build
    runs-on: [self-hosted, linux, x64, aws_ec2]

    steps:
      - name: Login to Docker Hub
        run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Pull image from Docker Hub
        run: docker pull sunilya96/java-backend:latest

      - name: Remove dangling images
        run: docker image prune -f

      - name: Stop and remove old backend container if exists
        run: |
          docker stop springboot-app || true
          docker rm springboot-app || true

      - name: Ensure Docker network exists
        run: |
          docker network inspect mynetwork >/dev/null 2>&1 || docker network create mynetwork

      - name: Run backend container
        run: |
          docker run -d \
            --name springboot-app \
            --network mynetwork \
            -p 8080:8080 \
            -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
            -e SPRING_DATASOURCE_USERNAME="${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
            -e SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            -e FRONTEND_ALLOWED_ORIGIN="${{ secrets.FRONTEND_ALLOWED_ORIGIN }}" \
            -e JAVA_OPTS="-Xms128m -Xmx256m" \
            --restart unless-stopped \
            sunilya96/java-backend:latest
``